<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Scroll</title>

<style>

@font-face {
  font-family: "Permanent Marker";
  src: url("./fonts/PermanentMarker-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}


@font-face {
  font-family: "Jost-VariableFont_wght";
  src: url("./fonts/Jost-VariableFont_wght.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: "YujiBoku-Regular";
  src: url("./fonts/YujiBoku-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: "YujiSyuku-Regular";
  src: url("./fonts/YujiSyuku-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

*{margin:0;padding:0;box-sizing:border-box;font-family: Jost-VariableFont_wght;    font-weight: 100;}

*::-webkit-scrollbar{display:none}

body{
  background: #2e2e2f;
  font-family:Arial, sans-serif;
  overflow:hidden;
  font-size:clamp(14px,1.1vw,18px);
}

.container{
  height:100dvh;
  width:100vw;
  overflow:hidden;
  display:flex;
  transition: transform 0.4s ease;
  will-change: transform;
}

.section{
  min-width:100vw;           /* CLAVE */
  height:100dvh;
  padding:8dvh 0;
  scroll-snap-align:start;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  flex-direction:column;
  position:relative;
  color:white;
  font-weight:bold;
  background-size:cover;
  background-position:center;
  box-shadow: inset 0 0 0 4px black;
}

.s1{
  background-image:
  radial-gradient(
    ellipse at center,
    rgba(0,0,0,0) 60%,
    rgba(0,0,0,0.6) 120%
  ),
  url(./img/irasshaimase.png);
  justify-content: center;
  }

/* Pills */
.pills{
  position:fixed;
  top:clamp(12px,2dvh,30px);
  left:clamp(12px,2vw,30px);
  display:flex;
  gap:clamp(3px,0.5dvh,8px);
  z-index:1000;
}
.pill{
  width:clamp(14px,2.5dvh,28px);
  height:clamp(6px,0.6vw,8px);
  border-radius:4px;
  background:white;
  transition:.3s;
}
.pill.active{background:#d22728}

/* HERO */
#irasshaimase{
  writing-mode:vertical-rl;
  text-orientation:upright;
  font-size: 8dvh;
  font-weight: bold;
  display: flex;
}

#irasshaimase * {
  font-family: YujiSyuku-Regular;
}


#scrollIndication{
  font-size:clamp(28px,6dvh,80px);
  opacity:.36;
  position: absolute;
  right: 20px;
  font-family: YujiSyuku-Regular;

  animation: hintMove 1.2s ease-in-out infinite;
}

@keyframes hintMove {
  0%   { transform: translateX(0); opacity: .25; }
  50%  { transform: translateX(10px); opacity: .6; }
  100% { transform: translateX(0); opacity: .25; }
}

/* PRODUCT */
.productIMG{
  width:clamp(260px,70vw,520px);
  max-height:40dvh;
  object-fit:contain;
}

.productName{
  font-family: "Permanent Marker";
  font-size:clamp(28px,6vw,64px);
  margin-bottom:clamp(10px,2dvh,30px);
  margin-top:clamp(6px,1dvh,16px);
  text-align:center;
  font-weight: 100;
}

.productDescription{
  font-size:clamp(14px,2.4vw,22px);
  width:min(700px,80%);
  text-align:center;
  line-height:1.5;
  max-height: 35dvh;
  overflow: scroll;
}

.allergies{
  width:min(700px,85%);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:clamp(14px,3vw,30px);
  margin-top:clamp(12px,3dvh,30px);
}

.allergy{display:flex;align-items:center;gap:10px}
.allergyIMG{width:clamp(26px,5vw,55px)}
.allergyTXT{font-size:clamp(10px,1.4vw,14px)}

.addProductButton{
  position:absolute;
  bottom:clamp(30px,7dvh,75px);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:clamp(12px,2vw,22px);
  background:white;
  border-radius:18px;
  font-size:clamp(10px,2.5vw,28px);
}

.productState{
  background:#d22728;
  padding:clamp(10px,1.8dvh,16px) clamp(14px,2vw,22px);
  border-radius:12px;
  color:white;
}

.productPrice{
  color:#d22728;
  font-weight:bold;
  margin-right: 15px;
}

/* RED BOX */
#redBox{
  position:fixed;
  top:0;
  right:clamp(12px,2vw,30px);
  height:clamp(60px,6dvh,60px);
  width:clamp(50px,4vw,50px);
  background:#d22728;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#redBox > img {
  width: 75%;
}


/* ===== KUROSAWA INTRO ===== */

/* Estado inicial bloqueado */
body.locked{
  pointer-events:none;
}

/* letras estado inicial */
#irasshaimase span{
  display:inline-block;
  opacity:0;
  transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg);
  color:#8b0000;
  filter: blur(8px);
}

/* activar animación */
#irasshaimase.animate span{
  animation: kurosawaEntry 950ms cubic-bezier(.2,.9,.2,1) forwards;
}

/* 🎬 ENTRADA DRAMÁTICA */
@keyframes kurosawaEntry{

  /* aparece desde el vacío */
  0%{
    opacity:0;
    transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg);
    filter: blur(10px);
    color:#6b0000;
  }

  /* golpe fuerte */
  45%{
    opacity:1;
    transform: translateX(-18px) translateY(6px) scale(0.75) rotate(3deg);
    filter: blur(0);
    color:#ff1a1a;
  }

  /* rebote overshoot */
  65%{
    transform: translateX(6px) translateY(-2px) scale(1.15) rotate(-2deg);
    color:#ff3b3b;
  }

  /* micro vibración tipo sello */
  75%{ transform: translateX(-3px) rotate(1deg); }
  80%{ transform: translateX(2px) rotate(-1deg); }
  85%{ transform: translateX(-2px) rotate(.5deg); }
  90%{ transform: translateX(1px) rotate(-.5deg); }

  /* encaje final */
  100%{
    opacity:1;
    transform: translateX(0) translateY(0) scale(1) rotate(0);
    color:white;

    filter: blur(0);
    will-change: auto;
  }
}









</style>
</head>

<body>

<div class="pills">
  <div class="pill active"></div>
</div>

<div id="redBox">
  <img src="./img/logo.png">
</div>

<div class="container">

  <div class="section s1">
    <p id="irasshaimase">
      <span>い</span><span>ら</span><span>っ</span><span>し</span><span>ゃ</span><span>い</span><span>ま</span><span>せ</span><span>!</span>
    </p>
    <p id="scrollIndication">></p>
  </div>

</div>


<script>
const ramenData = [
  {
    id: 1,
    name: "CURRY RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenCurry.png",
    description:
      "Un ramen de curry con caldo espeso y aromático, lleno de especias suaves y notas dulces de cebolla caramelizada. Los fideos salen brillantes y bien cubiertos, acompañados de pollo crujiente o tofu dorado, verduras tiernas y medio huevo marinado con la yema cremosa.",
    allergens: ["GLUTEN", "SOJA", "HUEVO"],
    price: 13
  },
  {
    id: 2,
    name: "SPICY MISO RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenCurry.png",
    description:
      "Ramen de miso picante con un caldo intenso, toque de chile fermentado, ajo y miso rojo. Acompañado de cerdo chashu, brotes de bambú y cebolla fresca.",
    allergens: ["GLUTEN", "SOJA"],
    price: 14
  }
]
</script>


<script>
const container = document.querySelector('.container')
const pillsContainer = document.querySelector('.pills')

let index = 0

let introFinished = false
document.body.classList.add('locked')

function render() {

  ramenData.forEach((ramen, i) => {

    const pill = document.createElement('div')
    pill.className = 'pill'
    if (i === 0) pill.classList.add('active')

    // SECTION
    const section = document.createElement('div')
    section.className = 'section'
    section.style.backgroundImage = `
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.75)),
      url(${ramen.background})
    `

    section.innerHTML = `
      <img class="productIMG" src="${ramen.image}">
      <p class="productName">${ramen.name}</p>
      <p class="productDescription">${ramen.description}</p>

      <div class="allergies">
        ${ramen.allergens.map(a => `
          <span class="allergy">
            <img class="allergyIMG" src="${ramen.image}">
            <p class="allergyTXT">${a}</p>
          </span>
        `).join('')}
      </div>

      <div class="addProductButton">
        <span class="productState">AÑADIR AL PEDIDO</span>
        <span class="productPrice">${ramen.price}€</span>
      </div>
    `

    container.appendChild(section)

    // PILL
    pillsContainer.appendChild(pill)
  })
}

function update() {
  container.scrollTo({
    left: index * window.innerWidth,
    behavior: 'smooth'
  })

  document.querySelectorAll('.pill').forEach((p, i) => {
    p.classList.toggle('active', i === index)
  })
}

/* CLICK */
document.addEventListener('click', (e) => {
  if (!introFinished) return
  if (e.target.closest('.addProductButton')) return

    console.log(e.target.closest('.addProductButton'));

  const half = window.innerWidth / 2

  if (e.clientX > half) {
    //NO ES UN BUG, TENGO QUE TENER UNO MAS PARA LA PORTADA, NO ramenData.length-1 porque si no no aparece la portada
    index = Math.min(index + 1, ramenData.length)
  } else {
    index = Math.max(index - 1, 0)
  }

  update()
})

/* SWIPE */
let startX = 0

document.addEventListener('touchstart', (e) => {
  if (!introFinished) return
  startX = e.touches[0].clientX
})

document.addEventListener('touchend', (e) => {
  const diff = startX - e.changedTouches[0].clientX
  const threshold = 50

  if (Math.abs(diff) > threshold) {
    if (diff > 0) {
      index = Math.min(index + 1, ramenData.length)
    } else {
      index = Math.max(index - 1, 0)
    }
    update()
  }
})

render()
update()



const welcomeSound = new Audio('./sound/irasshaimase.wav')
welcomeSound.preload = 'auto'
welcomeSound.volume = 0.9
let soundPlayed = false

function playWelcomeSound() {
  if (soundPlayed) return
  soundPlayed = true

  startIntroAnimation()
  welcomeSound.play().catch((e)=>{console.log(e);soundPlayed = false;})
}

// primera interacción válida
document.addEventListener('click', playWelcomeSound)
document.addEventListener('touchstart', playWelcomeSound)
document.addEventListener('pointerdown', playWelcomeSound)


function startIntroAnimation(){

  const letters = document.querySelectorAll('#irasshaimase span')
  const word = document.getElementById('irasshaimase')

  word.classList.add('animate')

  letters.forEach((l,i)=>{
    l.style.animationDelay = (i * 120) + 'ms'
  })

  // duración total animacióndocument.addEventListener('click', playWelcomeSound)
document.addEventListener('touchstart', playWelcomeSound)
  const totalDuration = letters.length * 120 + 900

  setTimeout(()=>{
    introFinished = true
    document.body.classList.remove('locked')
  }, totalDuration)
}

</script>

</body>
</html>
