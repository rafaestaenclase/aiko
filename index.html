<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Scroll</title>
<style>

/* ── FUENTES ── */
@font-face { font-family: "PermanentMarker"; src: url("./fonts/PermanentMarker-Regular.ttf") format("truetype"); }
@font-face { font-family: "Jost";           src: url("./fonts/Jost-VariableFont_wght.ttf") format("truetype"); font-weight: 100 900; }
@font-face { font-family: "YujiSyuku";      src: url("./fonts/YujiSyuku-Regular.ttf")       format("truetype"); }

/* ── RESET ── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box; font-weight: 100;
}
* { -webkit-tap-highlight-color: transparent;}
::-webkit-scrollbar { display: none; }

/* ── BASE ── */
body {
  background: #2e2e2f;
  overflow: hidden;
  font-size: clamp(14px, 1.1vw, 18px);
}
body.locked { pointer-events: none; }

/* ── SLIDER ── */
.container {
  display: flex;
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  transition: transform .4s ease;
  will-change: transform;
}

/* ── SECCIÓN GENÉRICA ── */
.section {
  min-width: 100vw;
  height: 100dvh;
  padding: 8dvh 0;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  flex-direction: column;
  position: relative;
  color: white;
  font-weight: bold;
  background-size: cover;
  background-position: center;
  box-shadow: inset 0 0 0 4px black;
}

/* ── PORTADA ── */
.s1 {
  justify-content: center;
  background-image:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,.6) 120%),
    url(./img/irasshaimase.png);
}

/* ── PILLS (indicador de slide) ── */
.pills {
  position: fixed;
  top: clamp(12px, 2dvh, 30px);
  left: clamp(12px, 2vw, 30px);
  display: flex;
  gap: clamp(3px, .5dvh, 8px);
  z-index: 1000;
}
.pill {
  width: clamp(14px, 2.5dvh, 28px);
  height: clamp(6px, .6vw, 8px);
  border-radius: 4px;
  background: white;
  transition: background .3s;
}
.pill.active { background: #d22728; }

/* ── LOGO ── */
#redBox {
  position: fixed;
  top: 0; right: clamp(12px, 2vw, 30px);
  width: clamp(50px, 4vw, 50px);
  height: clamp(60px, 6dvh, 60px);
  background: #d22728;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
#redBox img { width: 75%; }

/* ── IRASSHAIMASE (texto portada) ── */
#irasshaimase {
  writing-mode: vertical-rl;
  text-orientation: upright;
  font-size: 8dvh;
  font-weight: bold;
  display: flex;
  font-family: YujiSyuku;
}
#irasshaimase span {
  display: inline-block;
  opacity: 0;
  transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg);
  color: #8b0000;
  filter: blur(8px);
}
#irasshaimase.animate span {
  animation: kurosawaEntry 950ms cubic-bezier(.2,.9,.2,1) forwards;
}

/* ── FLECHA SCROLL ── */
#scrollIndication {
  font-size: clamp(28px, 6dvh, 80px);
  position: absolute;
  right: 20px;
  font-family: YujiSyuku;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.2,.9,.2,1);
}

/* ── UI: oculta hasta que termina la intro ── */
.pills, #redBox, #scrollIndication {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.2,.9,.2,1);
  pointer-events: none;
}
body.uiVisible .pills,
body.uiVisible #redBox {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
body.uiVisible #scrollIndication {
  opacity: .36; transform: translateY(0); pointer-events: auto;
  animation: hintMove 1.2s ease-in-out infinite;
}

/* ── PRODUCTO ── */
.productIMG {
  width: clamp(260px, 70vw, 520px);
  max-height: 40dvh;
  object-fit: contain;
}
.productName {
  font-family: PermanentMarker;
  font-size: clamp(28px, 6vw, 64px);
  margin: clamp(6px, 1dvh, 16px) 0 clamp(10px, 2dvh, 30px);
  text-align: center;
  font-weight: 100;
}
.productDescription {
  font-size: clamp(14px, 2.4vw, 22px);
  width: min(700px, 80%);
  text-align: center;
  line-height: 1.5;
  max-height: 35dvh;
  overflow: scroll;
  font-family: jost; font-weight: 400
}
.allergies {
  width: min(700px, 85%);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(14px, 3vw, 30px);
  margin-top: clamp(12px, 3dvh, 30px);
}
.allergy { display: flex; align-items: center; gap: 10px; }
.allergyIMG { width: clamp(26px, 5vw, 55px); }
.allergyTXT { font-size: clamp(10px, 1.4vw, 14px);font-family: jost; font-weight: 400 }

.addProductButton {
  position: absolute;
  bottom: clamp(30px, 7dvh, 75px);
  left: 50%; transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: clamp(12px, 2vw, 22px);
  background: white;
  border-radius: 18px;
  font-size: clamp(10px, 2.5vw, 28px);
}
.addProductButton.disabled {
  opacity: .4;
  pointer-events: none;
  filter: grayscale(.5);
  transition: opacity .3s, filter .3s;
}
.productState {
  background: #d22728;
  padding: clamp(10px, 1.8dvh, 16px) clamp(14px, 2vw, 22px);
  border-radius: 12px;
  color: white;
  font-family: jost; font-weight: 400
}
.productPrice { color: #d22728; font-weight: bold; margin-right: 15px; font-family: jost; font-weight: 400}

/* ── HOJA DE COMPLEMENTOS ── */
#extrasSheet {
  position: fixed;
  inset: 0;
  z-index: 5000;
  pointer-events: none;               /* invisible e inactivo por defecto */
}

#extrasSheet * {
  font-family: jost; font-weight: 400;
}

/* fondo oscuro detrás de la hoja */
#extrasBackdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.55);
  opacity: 0;
  transition: opacity .35s ease;
}

/* la hoja en sí */
#extrasPanel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100dvh;
  overflow: hidden;
  transform: translateY(100%);        /* empieza fuera de pantalla */
  transition: transform .4s cubic-bezier(.2,.9,.2,1);
  display: flex;
  flex-direction: column;
}

/* imagen de fondo de la hoja */
#extrasBG {
  position: absolute;
  inset: 0;
  background: url(./img/extrasBG.png) center/cover no-repeat;
}

/* overlay oscuro encima de la imagen */
#extrasBG::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.7));
}

/* contenido scrolleable */
#extrasContent {
  position: relative;         /* encima del ::after del BG */
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  padding: clamp(20px,4dvh,40px) clamp(20px,5vw,50px) 0;
  color: white;
  display: flex;
  flex-wrap: wrap;
  flex-direction: row;
  scrollbar-width: thin;
  scrollbar-color: rgba(210,39,40,.85) transparent;
}

#extrasPanelText {
    z-index: 2;
    color: white;
    height: 20dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    text-align: right;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
}

#extrasPanelText > * {
  font-family: jost; font-weight: 400;
  font-size: 23px;
}

#extrasPanelText > *:first-child {
  font-weight: bold;
}

/* título de cada categoría */
.extrasCategory {
  font-family: YujiSyuku;
  font-size: clamp(13px, 1.6vw, 18px);
  letter-spacing: 3px;
  opacity: .6;
  margin: clamp(16px,3dvh,28px) 0 clamp(8px,1.5dvh,14px);
  text-transform: uppercase;
  width: 100%;
}

/* fila de un extra */
.extraItem {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px,1.8dvh,16px) 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
  cursor: pointer;
  transition: opacity .2s;
  gap: 12px;
  width: 50%;
  flex-direction: column;
}
.extraItem:active { opacity: .6; }

.extraLeft  { display: flex; align-items: center; gap: clamp(10px,2vw,18px);    flex-direction: column; }
.extraIMG { width: 70%; font-size: clamp(22px,3.5vw,36px); }
.extraName{
    font-size: clamp(14px, 2vw, 20px);
    font-weight: bold !important;
    text-transform: uppercase;
}
.extraPrice { font-size: clamp(12px,1.6vw,17px); opacity: .7; }

/* checkbox custom */
.extraCheck {
  width: clamp(22px,2.8vw,30px);
  height: clamp(22px,2.8vw,30px);
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.extraItem.selected .extraCheck {
  background: #d22728;
  border-color: #d22728;
}
.extraItem.selected .extraCheck::after {
  content: '✓';
  color: white;
  font-size: clamp(12px,1.5vw,16px);
  font-weight: bold;
}

/* ── BOTÓN "Así está bien" (mismo estilo que addProductButton) ── */
#extrasConfirm {
  position: relative; z-index: 1;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px,2vw,22px);
  background: white;
  border-radius: 18px;
  font-size: clamp(10px,2.5vw,28px);
  margin: clamp(16px,3dvh,28px) auto;
  cursor: pointer;
  border: none;
  width: fit-content;
}
#extrasConfirm .productState { cursor: pointer; }

/* estado abierto */
#extrasSheet.open {
  pointer-events: auto;
}
#extrasSheet.open #extrasBackdrop { opacity: 1; }
#extrasSheet.open #extrasPanel    { transform: translateY(0); }

/* ── INTRO VIDEO ── */
#videoIntro {
  position: fixed;
  inset: 0; z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: .4;
}
#introVideo {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(.85) contrast(1.05);
  transition: opacity 1.2s ease;
}
#enterWrapper {
  position: absolute;
  top: 40vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  z-index: 2;
}
#loaderCircle {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.25);
  border-top: 3px solid #d22728;
  animation: spin 1s linear infinite;
  filter: drop-shadow(0 0 6px rgba(210,39,40,.6));
}
#enterText {
  position: relative; z-index: 2;
  color: white;
  font-size: clamp(18px, 2.5vw, 28px);
  letter-spacing: 4px;
  opacity: .85;
  font-family: YujiSyuku;
  white-space: nowrap;
  transition: opacity .4s ease, transform .4s ease;
}

/* intro al hacer click */
#videoIntro.hide #introVideo,
#videoIntro.hide #enterText { opacity: 0 !important; }
#videoIntro.removed { display: none; }

/* ── KEYFRAMES ── */
@keyframes kurosawaEntry {
  0%   { opacity: 0; transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg); filter: blur(10px); color: #6b0000; }
  45%  { opacity: 1; transform: translateX(-18px) translateY(6px) scale(.75) rotate(3deg);  filter: blur(0);   color: #ff1a1a; }
  65%  { transform: translateX(6px) translateY(-2px) scale(1.15) rotate(-2deg); color: #ff3b3b; }
  75%  { transform: translateX(-3px) rotate(1deg); }
  80%  { transform: translateX(2px) rotate(-1deg); }
  85%  { transform: translateX(-2px) rotate(.5deg); }
  90%  { transform: translateX(1px) rotate(-.5deg); }
  100% { opacity: 1; transform: translateX(0) translateY(0) scale(1) rotate(0); color: white; filter: blur(0); }
}

@keyframes hintMove {
  0%, 100% { transform: translateX(0);   opacity: .25; }
  50%       { transform: translateX(10px); opacity: .6; }
}

@keyframes pulseEnter {
  0%, 100% { opacity: .4; transform: scale(1); }
  50%       { opacity: 1; transform: scale(1.06); }
}

@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<body class="locked">

<!-- ── INTRO VIDEO ── -->
<div id="videoIntro">
  <video id="introVideo" autoplay muted loop playsinline>
    <source src="./img/irasshaimaseBGFILM.mp4" type="video/mp4">
  </video>
  <div id="enterWrapper">
    <div id="loaderCircle"></div>
    <div id="enterText"></div>
  </div>
</div>

<!-- ── UI PERMANENTE ── -->
<div class="pills"><div class="pill active"></div></div>
<div id="redBox"><img src="./img/logo.png"></div>

<!-- ── HOJA DE COMPLEMENTOS ── -->
<div id="extrasSheet">
  <div id="extrasBackdrop"></div>
  <div id="extrasPanel">
    <div id="extrasPanelText">
      <p>¡Uf! Casi se me olvida...</p>
      <p>esto te podría ir genial</p>
    </div>
    <div id="extrasBG"></div>
    <div id="extrasContent">
      <!-- Las categorías se inyectan desde JS -->
    </div>
    <button id="extrasConfirm">
      <span class="productState">ASÍ ESTÁ BIEN</span>
    </button>
  </div>
</div>


<div class="container">
  <div class="section s1">
    <p id="irasshaimase">
      <span>い</span><span>ら</span><span>っ</span><span>し</span><span>ゃ</span><span>い</span><span>ま</span><span>せ</span><span>!</span>
    </p>
    <p id="scrollIndication">></p>
  </div>
</div>

<script>
/* ── DATOS ── */
const ramenData = [
  {
    name: "CURRY RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenCurry.png",
    description: "Un ramen de curry con caldo espeso y aromático, lleno de especias suaves y notas dulces de cebolla caramelizada. Los fideos salen brillantes y bien cubiertos, acompañados de pollo crujiente o tofu dorado, verduras tiernas y medio huevo marinado con la yema cremosa.",
    allergens: ["GLUTEN", "SOJA", "HUEVO"],
    price: 13
  },
  {
    name: "SPICY MISO RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenCurry.png",
    description: "Ramen de miso picante con un caldo intenso, toque de chile fermentado, ajo y miso rojo. Acompañado de cerdo chashu, brotes de bambú y cebolla fresca.",
    allergens: ["GLUTEN", "SOJA"],
    price: 14
  }
]

/* ── ESTADO ── */
const container       = document.querySelector('.container')
const pillsContainer  = document.querySelector('.pills')
let index         = 0
let introFinished = false
let pageLoaded    = false

/* ── CONSTRUIR SLIDES ── */
function render() {
  ramenData.forEach(ramen => {

    // Pill
    const pill = document.createElement('div')
    pill.className = 'pill'
    pillsContainer.appendChild(pill)

    // Section
    const section = document.createElement('div')
    section.className = 'section'
    section.style.backgroundImage = `
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.75)),
      url(${ramen.background})`

    section.innerHTML = `
      <img class="productIMG" src="${ramen.image}" alt="${ramen.name}">
      <p class="productName">${ramen.name}</p>
      <p class="productDescription">${ramen.description}</p>
      <div class="allergies">
        ${ramen.allergens.map(a => `
          <span class="allergy">
            <img class="allergyIMG" src="${ramen.image}" alt="${a}">
            <p class="allergyTXT">${a}</p>
          </span>`).join('')}
      </div>
      <div class="addProductButton">
        <span class="productState">AÑADIR AL PEDIDO</span>
        <span class="productPrice">${ramen.price}€</span>
      </div>`

    container.appendChild(section)
  })
}

/* ── NAVEGAR AL SLIDE index ── */
function goTo(newIndex) {
  // +1 porque el slide 0 es la portada
  index = Math.max(0, Math.min(newIndex, ramenData.length))
  container.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' })
  document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === index))
}

/* ── NAVEGACIÓN: CLICK ── */
document.addEventListener('click', e => {
  if (!introFinished) return
  if (extrasOpen()) return
  if (e.target.closest('.addProductButton')) return
  goTo(index + (e.clientX > window.innerWidth / 2 ? 1 : -1))
})

/* ── NAVEGACIÓN: SWIPE ── */
let startX = 0
document.addEventListener('touchstart', e => { startX = e.touches[0].clientX }, { passive: true })
document.addEventListener('touchend', e => {
  if (!introFinished) return
  if (extrasOpen()) return
  const diff = startX - e.changedTouches[0].clientX
  if (Math.abs(diff) > 50) goTo(index + (diff > 0 ? 1 : -1))
})

/* ── INTRO: animación de letras ── */
function startIntroAnimation() {
  const letters = document.querySelectorAll('#irasshaimase span')
  document.getElementById('irasshaimase').classList.add('animate')
  letters.forEach((l, i) => l.style.animationDelay = (i * 120) + 'ms')

  const totalDuration = letters.length * 120 + 900
  setTimeout(() => {
    introFinished = true
    document.body.classList.remove('locked')
    document.body.classList.add('uiVisible')
  }, totalDuration)
}

/* ── INTRO: sonido + video ── */
const welcomeSound = new Audio('./sound/irasshaimase.wav')
welcomeSound.volume = 0.9
let soundPlayed = false

function playWelcomeSound() {
  if (!pageLoaded || soundPlayed) return
  soundPlayed = true

  const videoIntro = document.getElementById('videoIntro')
  videoIntro.classList.add('hide')
  setTimeout(() => videoIntro.classList.add('removed'), 1050)

  welcomeSound.play().catch(() => { soundPlayed = false })
  startIntroAnimation()
}

// Primera interacción del usuario arranca la intro
['click', 'touchstart', 'pointerdown'].forEach(ev =>
  document.addEventListener(ev, playWelcomeSound)
)

/* ── CARGA COMPLETA ── */
window.addEventListener('load', () => {
  pageLoaded = true
  const loader = document.getElementById('loaderCircle')
  const text   = document.getElementById('enterText')
  loader.remove()
  text.textContent = "PULSA PARA ENTRAR"
  text.style.animation = "pulseEnter 1.6s ease-in-out infinite"
})

/* ── INIT ── */
render()
goTo(0)

/* ══════════════════════════════════════════
   HOJA DE COMPLEMENTOS
   ══════════════════════════════════════════ */

/* Datos de complementos (iguales para todos los ramens) */
const extrasData = [
  {
    category: "🍹 Bebidas",
    items: [
      { name: "Ramune",        price: 3,   img: "./img/ramenCurry.png" },
      { name: "Té matcha",     price: 2.5, img: "./img/ramenCurry.png" },
      { name: "Cerveza Sapporo", price: 3.5, img: "./img/ramenCurry.png" },
    ]
  },
  {
    category: "🍮 Postres",
    items: [
      { name: "Mochi de fresa",   price: 3,   img: "./img/ramenCurry.png" },
      { name: "Dorayaki",         price: 2.5, img: "./img/ramenCurry.png" },
      { name: "Pudding de tofu",  price: 3,   img: "./img/ramenCurry.png" },
    ]
  }
]

const extrasSheet   = document.getElementById('extrasSheet')
const extrasContent = document.getElementById('extrasContent')
const extrasConfirm = document.getElementById('extrasConfirm')
const extrasBackdrop = document.getElementById('extrasBackdrop')

/* Construir el contenido de la hoja una sola vez */
extrasData.forEach(({ category, items }) => {
  const catEl = document.createElement('p')
  catEl.className = 'extrasCategory'
  catEl.textContent = category
  extrasContent.appendChild(catEl)

  items.forEach(item => {
    const row = document.createElement('div')
    row.className = 'extraItem'
    row.innerHTML = `
      <div class="extraLeft">
        <img src= "${item.img}" class="extraIMG">
        <span class="extraName">${item.name}</span>
      </div>
      <span class="extraPrice">+${item.price.toFixed(2).replace('.',',')}€</span>
      <div class="extraCheck"></div>`

    // Toggle selección al pulsar la fila
    row.addEventListener('click', e => {
      e.stopPropagation()
      row.classList.toggle('selected')
    })

    extrasContent.appendChild(row)
  })
})

/* Abrir la hoja */
function openExtras() {
  extrasSheet.classList.add('open')
  document.querySelectorAll('.addProductButton').forEach(b => b.classList.add('disabled'))

  // 🔥 reset selección
  document.querySelectorAll('.extraItem.selected')
    .forEach(el => el.classList.remove('selected'))

  // 🔥 reset scroll arriba
  extrasContent.scrollTop = 0
}

function closeExtras() {
  extrasSheet.classList.remove('open')
  document.querySelectorAll('.addProductButton').forEach(b => b.classList.remove('disabled'))
  introFinished = false
  setTimeout(() => { introFinished = true }, 100)
}

// Cerrar al pulsar el backdrop o el botón de confirmar
extrasBackdrop.addEventListener('click', closeExtras)
extrasConfirm.addEventListener('click',  closeExtras)

// Abrir al pulsar cualquier addProductButton
document.addEventListener('click', e => {
  const btn = e.target.closest('.addProductButton')
  if (btn) { e.stopPropagation(); openExtras() }
})

function extrasOpen() { return extrasSheet.classList.contains('open') }


</script>
</body>
</html>
