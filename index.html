<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Scroll</title>
<style>

/* ── FUENTES ── */
@font-face { font-family: "PermanentMarker"; src: url("./fonts/PermanentMarker-Regular.ttf") format("truetype"); }
@font-face { font-family: "Jost";           src: url("./fonts/Jost-VariableFont_wght.ttf") format("truetype"); font-weight: 100 900; }
@font-face { font-family: "YujiSyuku";      src: url("./fonts/YujiSyuku-Regular.ttf")       format("truetype"); }

/* ── RESET ── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box; font-weight: 100;
}
* { -webkit-tap-highlight-color: transparent;}
::-webkit-scrollbar { display: none; }

/* ── BASE ── */
body {
  background: #2e2e2f;
  overflow: hidden;
  font-size: clamp(14px, 1.1vw, 18px);
}
body.locked { pointer-events: none; }

/* ── SLIDER ── */
.container {
  display: flex;
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  transition: transform .4s ease;
  will-change: transform;
}

/* ── SECCIÓN GENÉRICA ── */
.section {
  min-width: 100vw;
  height: 100dvh;
  padding: 8dvh 0;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  flex-direction: column;
  position: relative;
  color: white;
  font-weight: bold;
  background-size: cover;
  background-position: center;
  box-shadow: inset 0 0 0 4px black;
}

/* ── PORTADA ── */
.s1 {
  justify-content: center;
  background-image:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,.6) 120%),
    url(./img/irasshaimase.png);
}

/* ── PILLS (indicador de slide) ── */
.pills {
  position: fixed;
  top: clamp(12px, 2dvh, 30px);
  left: clamp(12px, 2vw, 30px);
  display: flex;
  gap: clamp(3px, .5dvh, 8px);
  z-index: 1000;
}
.pill {
  width: clamp(14px, 2.5dvh, 28px);
  height: clamp(6px, .6vw, 8px);
  border-radius: 4px;
  background: white;
  transition: background .3s;
}
.pill.active { background: #d22728; }

/* ── LOGO ── */
#redBox {
  position: fixed;
  top: 0; right: clamp(12px, 2vw, 30px);
  width: clamp(50px, 4vw, 50px);
  height: clamp(60px, 6dvh, 60px);
  background: #d22728;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
#redBox img { width: 75%; }

/* ── IRASSHAIMASE (texto portada) ── */
#irasshaimase {
  writing-mode: vertical-rl;
  text-orientation: upright;
  font-size: 8dvh;
  font-weight: bold;
  display: flex;
  font-family: YujiSyuku;
}
#irasshaimase span {
  display: inline-block;
  opacity: 0;
  transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg);
  color: #8b0000;
  filter: blur(8px);
}
#irasshaimase.animate span {
  animation: kurosawaEntry 950ms cubic-bezier(.2,.9,.2,1) forwards;
}

/* ── FLECHA SCROLL ── */
#scrollIndication {
  font-size: clamp(28px, 6dvh, 80px);
  position: absolute;
  right: 20px;
  font-family: YujiSyuku;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.2,.9,.2,1);
}

/* ── UI: oculta hasta que termina la intro ── */
.pills, #redBox, #scrollIndication {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.2,.9,.2,1);
  pointer-events: none;
}
body.uiVisible .pills,
body.uiVisible #redBox {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
body.uiVisible #scrollIndication {
  opacity: .36; transform: translateY(0); pointer-events: auto;
  animation: hintMove 1.2s ease-in-out infinite;
}

/* ── PRODUCTO ── */
.productIMG {
  width: clamp(260px, 70vw, 520px);
  max-height: 40dvh;
  object-fit: contain;
}
.productName {
  font-family: PermanentMarker;
  font-size: clamp(28px, 6vw, 64px);
  margin: clamp(6px, 1dvh, 16px) 0 clamp(10px, 2dvh, 30px);
  text-align: center;
  font-weight: 100;
}
.productDescription {
  font-size: clamp(14px, 2.4vw, 22px);
  width: min(700px, 80%);
  text-align: center;
  line-height: 1.5;
  max-height: 35dvh;
  overflow: scroll;
  font-family: jost; font-weight: 400
}
.allergies {
  width: min(700px, 85%);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(14px, 3vw, 30px);
  margin-top: clamp(12px, 3dvh, 30px);
}
.allergy { display: flex; align-items: center; gap: 5px; }
.allergyIMG { width: clamp(26px, 5vw, 55px); }
.allergyTXT { font-size: clamp(10px, 1.4vw, 14px);font-family: jost; font-weight: 400 }

.addProductButton {
  position: absolute;
  bottom: clamp(30px, 7dvh, 75px);
  left: 50%; transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: clamp(30px, 4vw, 44px);
  background: white;
  border-radius: 18px;
  font-size: clamp(10px, 2.5vw, 28px);
}
.addProductButton.disabled {
  opacity: .4;
  pointer-events: none;
  filter: grayscale(.5);
  transition: opacity .3s, filter .3s;
}
.productState {
  background: #d22728;
  padding: clamp(10px, 1.8dvh, 16px) clamp(14px, 2vw, 22px);
  border-radius: 12px;
  color: white;
  font-family: jost; font-weight: 400
}
.productPrice { color: #d22728; font-weight: bold; margin-right: 15px; font-family: jost; font-weight: 400}

/* ── HOJA DE COMPLEMENTOS ── */
#extrasSheet {
  position: fixed;
  inset: 0;
  z-index: 5000;
  pointer-events: none;               /* invisible e inactivo por defecto */
}

#extrasSheet * {
  font-family: jost; font-weight: 400;
}

/* fondo oscuro detrás de la hoja */
#extrasBackdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.55);
  opacity: 0;
  transition: opacity .35s ease;
}

/* la hoja en sí */
#extrasPanel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100dvh;
  overflow: hidden;
  transform: translateY(100%);        /* empieza fuera de pantalla */
  transition: transform .4s cubic-bezier(.2,.9,.2,1);
  display: flex;
  flex-direction: column;
}

/* imagen de fondo de la hoja */
#extrasBG {
  position: absolute;
  inset: 0;
  background: url(./img/extrasBG.png) center/cover no-repeat;
}

/* overlay oscuro encima de la imagen */
#extrasBG::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.7));
}

/* contenido scrolleable */
#extrasContent {
  position: relative;         /* encima del ::after del BG */
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  padding: clamp(20px,4dvh,40px) clamp(20px,5vw,50px) 0;
  color: white;
  display: flex;
  flex-wrap: wrap;
  flex-direction: row;
  scrollbar-width: thin;
  scrollbar-color: rgba(210,39,40,.85) transparent;
}

#extrasPanelText {
    z-index: 2;
    color: white;
    height: 20dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    text-align: right;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
}

#extrasPanelText > * {
  font-family: jost; font-weight: 400;
  font-size: 23px;
}

#extrasPanelText > *:first-child {
  font-weight: bold;
}

/* título de cada categoría */
.extrasCategory {
  font-family: YujiSyuku;
  font-size: clamp(13px, 1.6vw, 18px);
  letter-spacing: 3px;
  opacity: .6;
  margin: clamp(16px,3dvh,28px) 0 clamp(8px,1.5dvh,14px);
  text-transform: uppercase;
  width: 100%;
}

/* fila de un extra */
.extraItem {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px,1.8dvh,16px) 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
  cursor: pointer;
  transition: opacity .2s;
  gap: 12px;
  width: 50%;
  flex-direction: column;
}
.extraItem:active { opacity: .6; }

.extraLeft  { display: flex; align-items: center; gap: clamp(10px,2vw,18px);    flex-direction: column; }
.extraIMG { width: 70%; font-size: clamp(22px,3.5vw,36px); }
.extraName{
    font-size: clamp(14px, 2vw, 20px);
    font-weight: bold !important;
    text-transform: uppercase;
}
.extraPrice { font-size: clamp(12px,1.6vw,17px); opacity: .7; }

/* checkbox custom */
.extraCheck {
  width: clamp(22px,2.8vw,30px);
  height: clamp(22px,2.8vw,30px);
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.extraItem.selected .extraCheck {
  background: #d22728;
  border-color: #d22728;
}
.extraItem.selected .extraCheck::after {
  content: '✓';
  color: white;
  font-size: clamp(12px,1.5vw,16px);
  font-weight: bold;
}

/* ── BOTÓN "Así está bien" (mismo estilo que addProductButton) ── */
#extrasConfirm {
  position: relative; z-index: 1;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px,2vw,22px);
  background: white;
  border-radius: 18px;
  font-size: clamp(10px,2.5vw,28px);
  margin: clamp(16px,3dvh,28px) auto;
  cursor: pointer;
  border: none;
  width: fit-content;
}
#extrasConfirm .productState { cursor: pointer; }

/* estado abierto */
#extrasSheet.open {
  pointer-events: auto;
}
#extrasSheet.open #extrasBackdrop { opacity: 1; }
#extrasSheet.open #extrasPanel    { transform: translateY(0); }

/* ── INTRO VIDEO ── */
#videoIntro {
  position: fixed;
  inset: 0; z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: .4;
}
#introVideo {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(.85) contrast(1.05);
  transition: opacity 1.2s ease;
}
#enterWrapper {
  position: absolute;
  top: 40vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  z-index: 2;
}
#loaderCircle {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.25);
  border-top: 3px solid #d22728;
  animation: spin 1s linear infinite;
  filter: drop-shadow(0 0 6px rgba(210,39,40,.6));
}
#enterText {
  position: relative; z-index: 2;
  color: white;
  font-size: clamp(18px, 2.5vw, 28px);
  letter-spacing: 4px;
  opacity: .85;
  font-family: YujiSyuku;
  white-space: nowrap;
  transition: opacity .4s ease, transform .4s ease;
}

/* intro al hacer click */
#videoIntro.hide #introVideo,
#videoIntro.hide #enterText { opacity: 0 !important; }
#videoIntro.removed { display: none; }

/* ── KEYFRAMES ── */
@keyframes kurosawaEntry {
  0%   { opacity: 0; transform: translateX(60vw) translateY(-40vh) scale(8) rotate(-20deg); filter: blur(10px); color: #6b0000; }
  45%  { opacity: 1; transform: translateX(-18px) translateY(6px) scale(.75) rotate(3deg);  filter: blur(0);   color: #ff1a1a; }
  65%  { transform: translateX(6px) translateY(-2px) scale(1.15) rotate(-2deg); color: #ff3b3b; }
  75%  { transform: translateX(-3px) rotate(1deg); }
  80%  { transform: translateX(2px) rotate(-1deg); }
  85%  { transform: translateX(-2px) rotate(.5deg); }
  90%  { transform: translateX(1px) rotate(-.5deg); }
  100% { opacity: 1; transform: translateX(0) translateY(0) scale(1) rotate(0); color: white; filter: blur(0); }
}

@keyframes hintMove {
  0%, 100% { transform: translateX(0);   opacity: .25; }
  50%       { transform: translateX(10px); opacity: .6; }
}

@keyframes pulseEnter {
  0%, 100% { opacity: .4; transform: scale(1); }
  50%       { opacity: 1; transform: scale(1.06); }
}

@keyframes spin { to { transform: rotate(360deg); } }


/* ── CARRITO FAB ── */
#cartFAB {
  position: fixed;
  bottom: clamp(30px, 7dvh, 75px);
  right: 0;
  z-index: 4000;

  display: flex;
  align-items: center;
  gap: 10px;
  padding: clamp(12px, 1.8dvh, 16px) clamp(16px, 3vw, 22px);

  background: #d22728;
  color: white;
  border: none;
  border-bottom-left-radius: 18px;
  border-top-left-radius: 18px;
  cursor: pointer;
  font-family: jost;
  font-size: clamp(13px, 2vw, 16px);
  font-weight: 400;

  /* oculto por defecto */
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  pointer-events: none;
  transition: opacity .35s ease, transform .35s cubic-bezier(.2,.9,.2,1);
  will-change: transform, opacity;
}

/* visible cuando hay items */
#cartFAB.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

/* micro-bounce al añadir item */
#cartFAB.bump {
  animation: fabBump .35s cubic-bezier(.2,.9,.2,1);
}

#cartIcon {
  width: clamp(18px, 2.5vw, 22px);
  height: clamp(18px, 2.5vw, 22px);
  flex-shrink: 0;
}

#cartBadge {
  background: white;
  color: #d22728;
  border-radius: 50%;
  width: clamp(20px, 3vw, 26px);
  height: clamp(20px, 3vw, 26px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(11px, 1.5vw, 13px);
  font-weight: bold;
  flex-shrink: 0;
}

#cartTotal {
  font-weight: bold;
  white-space: nowrap;
}

@keyframes fabBump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  70%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}

/* ══════════════════════════════
   HOJA DEL CARRITO
   ══════════════════════════════ */

#cartSheet {
  position: fixed;
  inset: 0;
  z-index: 6000;          /* por encima del FAB (4000) y extrasSheet (5000) */
  pointer-events: none;
}

#cartSheet * { font-family: jost; font-weight: 400; }

/* backdrop */
#cartBackdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.6);
  opacity: 0;
  transition: opacity .4s ease;
}

/* panel: entra desde ARRIBA */
#cartPanel {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 100dvh;
  overflow: hidden;
  transform: translateY(-100%);
  transition: transform .45s cubic-bezier(.2,.9,.2,1);
  display: flex;
  flex-direction: column;
}

/* fondo imagen igual que extrasSheet */
#cartBG {
  position: absolute;
  inset: 0;
  background: url(./img/extrasBG.png) center/cover no-repeat;
}
#cartBG::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,.5));
}

/* cabecera fija */
#cartPanelHeader {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(52px,8dvh,80px) clamp(20px,5vw,50px) clamp(16px,2.5dvh,28px);
  flex-shrink: 0;
}
#cartPanelTitle {
  font-family: YujiSyuku;
  font-size: clamp(26px,5vw,42px);
  color: white;
  letter-spacing: 2px;
}
#cartClose {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  color: white;
  border-radius: 50%;
  width: clamp(36px,5vw,46px);
  height: clamp(36px,5vw,46px);
  font-size: clamp(14px,2vw,18px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .2s;
}
#cartClose:active { background: rgba(255,255,255,.3); }

/* zona scrolleable de items */
#cartItemsScroll {
  position: relative;
  z-index: 2;
  flex: 1;
  overflow-y: auto;
  padding: 0 clamp(20px,5vw,50px) clamp(16px,3dvh,28px);
  color: white;
  scrollbar-width: thin;
  scrollbar-color: rgba(210,39,40,.85) transparent;
  display: flex;
  flex-direction: column;
  gap: clamp(10px,2dvh,18px);
}

/* ── CART ITEM ── */
.cartItem {
  display: flex;
  align-items: center;
  gap: clamp(12px,2vw,20px);
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  padding: clamp(12px,2dvh,18px) clamp(14px,2.5vw,22px);
  transition: opacity .25s, transform .3s;
}
.cartItem.removing {
  opacity: 0;
  transform: translateX(60px) scale(.95);
}

.cartItemImg {
  width: clamp(52px,10vw,72px);
  height: clamp(52px,10vw,72px);
  object-fit: contain;
  flex-shrink: 0;
  border-radius: 10px;
  background: rgba(0,0,0,.2);
}

.cartItemInfo {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;         /* evita overflow del flex child */
}
.cartItemName {
  font-family: PermanentMarker;
  font-size: clamp(14px,2.5vw,20px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cartItemExtras {
  font-size: clamp(10px,1.4vw,13px);
  opacity: .6;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cartItemPrice {
  font-size: clamp(14px,2vw,18px);
  color: #ff6b6b;
  font-weight: bold;
  white-space: nowrap;
  margin-top: 4px;
}

/* botón eliminar */
.cartItemDelete {
  background: rgba(210,39,40,.2);
  border: 1px solid rgba(210,39,40,.4);
  color: #ff6b6b;
  border-radius: 10px;
  width: clamp(36px,5vw,44px);
  height: clamp(36px,5vw,44px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s;
}
.cartItemDelete:active { background: rgba(210,39,40,.4); }
.cartItemDelete svg {
  width: clamp(16px,2.2vw,20px);
  height: clamp(16px,2.2vw,20px);
  pointer-events: none;
}

/* estado vacío */
#cartEmpty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  opacity: .4;
  gap: 12px;
  padding-bottom: 10dvh;
}
#cartEmpty svg {
  width: clamp(48px,8vw,64px);
  height: clamp(48px,8vw,64px);
  stroke: white;
}
#cartEmpty p {
  font-family: YujiSyuku;
  font-size: clamp(15px,2.2vw,20px);
  color: white;
  letter-spacing: 2px;
}

/* footer con total + botón pago */
#cartFooter {
  position: relative;
  z-index: 2;
  flex-shrink: 0;
  padding: clamp(14px,2.5dvh,24px) clamp(20px,5vw,50px) clamp(24px,5dvh,48px);
  display: flex;
  flex-direction: column;
  gap: clamp(10px,2dvh,18px);
  border-top: 1px solid rgba(255,255,255,.1);
  background: rgba(0,0,0,.25);
}
#cartFooterTotal {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  color: white;
}
#cartFooterLabel {
  font-family: YujiSyuku;
  font-size: clamp(13px,1.8vw,18px);
  letter-spacing: 3px;
  opacity: .6;
}
#cartFooterPrice {
  font-family: jost;
  font-weight: bold;
  font-size: clamp(24px,4.5vw,40px);
}
#cartCheckout {
  background: white;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  width: 100%;
  font-size: clamp(13px,2.5vw,22px);
}
#cartCheckout .productState {
  width: 100%;
  text-align: center;
  border-radius: 18px;
}

/* estado abierto */
#cartSheet.open { pointer-events: auto; }
#cartSheet.open #cartBackdrop { opacity: 1; }
#cartSheet.open #cartPanel    { transform: translateY(0); }

</style>
</head>

<body class="locked">

<!-- ── INTRO VIDEO ── -->
<div id="videoIntro">
  <video id="introVideo" autoplay muted loop playsinline>
    <source src="./img/irasshaimaseBGFILM.mp4" type="video/mp4">
  </video>
  <div id="enterWrapper">
    <div id="loaderCircle"></div>
    <div id="enterText"></div>
  </div>
</div>

<!-- ── UI PERMANENTE ── -->
<div class="pills"><div class="pill active"></div></div>
<div id="redBox"><img src="./img/logo.png"></div>

<!-- ── HOJA DE COMPLEMENTOS ── -->
<div id="extrasSheet">
  <div id="extrasBackdrop"></div>
  <div id="extrasPanel">
    <div id="extrasPanelText">
      <p>¡Uf! Casi se me olvida...</p>
      <p>esto te podría ir genial</p>
    </div>
    <div id="extrasBG"></div>
    <div id="extrasContent">
      <!-- Las categorías se inyectan desde JS -->
    </div>
    <button id="extrasConfirm">
      <span class="productState">ASÍ ESTÁ BIEN</span>
    </button>
  </div>
</div>

<!-- ── HOJA DEL CARRITO ── -->
<div id="cartSheet">
  <div id="cartBackdrop"></div>
  <div id="cartPanel">

    <div id="cartPanelHeader">
      <p id="cartPanelTitle">Tu pedido</p>
      <button id="cartClose" aria-label="Cerrar carrito">✕</button>
    </div>

    <div id="cartBG"></div>

    <div id="cartItemsScroll">
      <!-- se inyecta con renderCart() -->
    </div>

    <div id="cartFooter">
      <div id="cartFooterTotal">
        <span id="cartFooterLabel">TOTAL</span>
        <span id="cartFooterPrice">0,00€</span>
      </div>
      <button id="cartCheckout">
        <span class="productState">REALIZAR EL PAGO</span>
      </button>
    </div>

  </div>
</div>

<!-- ── CARRITO FAB ── -->
<button id="cartFAB" aria-label="Ver carrito">
  <svg id="cartIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  <span id="cartBadge">0</span>
  <!--<span id="cartTotal"></span>-->
</button>

<div class="container">
  <div class="section s1">
    <p id="irasshaimase">
      <span>い</span><span>ら</span><span>っ</span><span>し</span><span>ゃ</span><span>い</span><span>ま</span><span>せ</span><span>!</span>
    </p>
    <p id="scrollIndication">></p>
  </div>
</div>

<script>
/* ── DATOS ── */
const ramenData = [
  {
    id: "ramen_curry",
    name: "CURRY RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenCurry.png",
    description: "Un ramen de curry con caldo espeso y aromático, lleno de especias suaves y notas dulces de cebolla caramelizada. Los fideos salen brillantes y bien cubiertos, acompañados de pollo crujiente o tofu dorado, verduras tiernas y medio huevo marinado con la yema cremosa.",
    allergens: [
      { name: "GLUTEN", img: "./img/gluten.png" },
      { name: "SOJA",   img: "./img/gluten.png" },
      { name: "HUEVO",  img: "./img/gluten.png" }
    ],
    price: 13
  },
  {
    id: "ramen_spicy_miso",
    name: "SPICY MISO RAMEN",
    background: "./img/ramenBG.png",
    image: "./img/ramenMiso.png",
    description: "Un ramen de curry con caldo espeso y aromático, lleno de especias suaves y notas dulces de cebolla caramelizada. Los fideos salen brillantes y bien cubiertos, acompañados de pollo crujiente o tofu dorado, verduras tiernas y medio huevo marinado con la yema cremosa.",
    allergens: [
      { name: "GLUTEN", img: "./img/gluten.png" },
      { name: "SOJA",   img: "./img/gluten.png" },
      { name: "HUEVO",  img: "./img/gluten.png" },
      { name: "SOJA",   img: "./img/gluten.png" }
    ],
    price: 14
  }
]


const order = []
let selectedRamenID = null


/* ── ESTADO ── */
const container       = document.querySelector('.container')
const pillsContainer  = document.querySelector('.pills')
let index         = 0
let introFinished = false
let pageLoaded    = false

/* ── CONSTRUIR SLIDES ── */
function render() {
  ramenData.forEach(ramen => {

    // Pill
    const pill = document.createElement('div')
    pill.className = 'pill'
    pillsContainer.appendChild(pill)

    // Section
    const section = document.createElement('div')
    section.className = 'section'
    section.style.backgroundImage = `
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.75)),
      url(${ramen.background})`

    section.innerHTML = `
      <img class="productIMG" src="${ramen.image}" alt="${ramen.name}">
      <p class="productName">${ramen.name}</p>
      <p class="productDescription">${ramen.description}</p>
      <div class="allergies">
        ${ramen.allergens.map(a => `
          <span class="allergy">
            <img class="allergyIMG" src="${a.img}" alt="${a.name}">
            <p class="allergyTXT">${a.name}</p>
          </span>`).join('')}
      </div>
      <div class="addProductButton" data-ramen-id="${ramen.id}">
        <span class="productState">AÑADIR AL PEDIDO</span>
        <span class="productPrice">${ramen.price}€</span>
      </div>`

    container.appendChild(section)
  })
}

const slideSound = new Audio('./sound/swipe.wav')  // cambia el nombre al tuyo
slideSound.volume = 0.2

/* ── NAVEGAR AL SLIDE index ── */
function goTo(newIndex) {
  const clamped = Math.max(0, Math.min(newIndex, ramenData.length))
  if (clamped === index) return  // está en un tope, no hace nada

  index = clamped
  slideSound.currentTime = 0
  slideSound.play().catch(() => {})
  container.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' })
  document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === index))
}

/* ── NAVEGACIÓN: CLICK ── */
document.addEventListener('click', e => {
  if (!introFinished) return
  if (extrasOpen()) return
  if (cartOpen()) return           // ← añadir esta línea
  if (e.target.closest('.addProductButton')) return
  goTo(index + (e.clientX > window.innerWidth / 2 ? 1 : -1))
})

/* ── NAVEGACIÓN: SWIPE ── */
let startX = 0
document.addEventListener('touchstart', e => { startX = e.touches[0].clientX }, { passive: true })
document.addEventListener('touchend', e => {
  if (!introFinished) return
  if (extrasOpen()) return
  if (cartOpen()) return           // ← añadir esta línea
  const diff = startX - e.changedTouches[0].clientX
  if (Math.abs(diff) > 50) goTo(index + (diff > 0 ? 1 : -1))
})

/* ── INTRO: animación de letras ── */
function startIntroAnimation() {
  const letters = document.querySelectorAll('#irasshaimase span')
  document.getElementById('irasshaimase').classList.add('animate')
  letters.forEach((l, i) => l.style.animationDelay = (i * 120) + 'ms')

  const totalDuration = letters.length * 120 + 900
  setTimeout(() => {
    introFinished = true
    document.body.classList.remove('locked')
    document.body.classList.add('uiVisible')
  }, totalDuration)
}

/* ── INTRO: sonido + video ── */
const welcomeSound = new Audio('./sound/irasshaimase.wav')
welcomeSound.volume = 0.9
let soundPlayed = false

function playWelcomeSound() {
  if (!pageLoaded || soundPlayed) return
  soundPlayed = true

  const videoIntro = document.getElementById('videoIntro')
  videoIntro.classList.add('hide')
  setTimeout(() => videoIntro.classList.add('removed'), 1050)

  welcomeSound.play().catch(() => { soundPlayed = false })
  startIntroAnimation()
}

// Primera interacción del usuario arranca la intro
['click', 'touchstart', 'pointerdown'].forEach(ev =>
  document.addEventListener(ev, playWelcomeSound)
)

/* ── CARGA COMPLETA ── */
window.addEventListener('load', () => {
  pageLoaded = true
  const loader = document.getElementById('loaderCircle')
  const text   = document.getElementById('enterText')
  loader.remove()
  text.textContent = "PULSA PARA ENTRAR"
  text.style.animation = "pulseEnter 1.6s ease-in-out infinite"
})

/* ── INIT ── */
render()
goTo(0)

/* ══════════════════════════════════════════
   HOJA DE COMPLEMENTOS
   ══════════════════════════════════════════ */

/* Datos de complementos (iguales para todos los ramens) */
const extrasData = [

  {
    category: "Complementos",
    items: [
      { id:"croqueta", name:"Croqueta", price:2, img:"./img/croqueta.png" },
      { id:"dorayaki", name:"Dorayaki", price:2.5, img:"./img/dorayaki.png" }
    ]
  },
  {
    category: "Bebidas",
    items: [
      { id:"matcha", name:"Té matcha", price:2.5, img:"./img/matcha.png" }
    ]
  }
]

const extrasSheet   = document.getElementById('extrasSheet')
const extrasContent = document.getElementById('extrasContent')
const extrasConfirm = document.getElementById('extrasConfirm')
const extrasBackdrop = document.getElementById('extrasBackdrop')
const extrasSelectedSound = new Audio('./sound/extraSelected.wav')
extrasSelectedSound.volume = 0.5

/* Construir el contenido de la hoja una sola vez */
extrasData.forEach(({ category, items }) => {
  const catEl = document.createElement('p')
  catEl.className = 'extrasCategory'
  catEl.textContent = category
  extrasContent.appendChild(catEl)

  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'extraItem';
    row.dataset.extraId = item.id;
    row.innerHTML = `
      <div class="extraLeft">
        <img src= "${item.img}" class="extraIMG">
        <span class="extraName">${item.name}</span>
      </div>
      <span class="extraPrice">+${item.price.toFixed(2).replace('.',',')}€</span>
      <div class="extraCheck"></div>`

    // Toggle selección al pulsar la fila
    row.addEventListener('click', e => {
      e.stopPropagation()
      extrasSelectedSound.currentTime = 0
      extrasSelectedSound.play().catch(() => {})
      row.classList.toggle('selected')
    })

    extrasContent.appendChild(row)
  })
})

const extrasSound = new Audio('./sound/extras.wav')
extrasSound.volume = 0.4

/* Abrir la hoja */
function openExtras() {
  extrasSound.currentTime = 0
  extrasSound.play().catch(() => {})
  extrasSheet.classList.add('open')
  document.querySelectorAll('.addProductButton').forEach(b => b.classList.add('disabled'))
  document.querySelectorAll('.extraItem.selected').forEach(el => el.classList.remove('selected'))
  extrasContent.scrollTop = 0
}

function closeExtras() {
  extrasSheet.classList.remove('open')
  document.querySelectorAll('.addProductButton').forEach(b => b.classList.remove('disabled'))
  introFinished = false
  setTimeout(() => { introFinished = true }, 100)
}

// Cerrar al pulsar el backdrop o el botón de confirmar
extrasBackdrop.addEventListener('click', closeExtras)
extrasConfirm.addEventListener('click', () => {

  const selectedExtras = [...document.querySelectorAll('.extraItem.selected')]
    .map(el => el.dataset.extraId)
    .sort()   // ordenar para que la comparación de merge sea fiable

  // ── Lógica de merge inteligente ──
  const existingIdx = order.findIndex(item =>
    item.ramen_id === selectedRamenID &&
    JSON.stringify([...item.extras].sort()) === JSON.stringify(selectedExtras)
  )

  if (existingIdx !== -1) {
    // Mismo ramen + mismos extras → aumentar qty
    order[existingIdx].qty++
  } else {
    // Nueva combinación → nueva línea
    order.push({
      ramen_id: selectedRamenID,
      extras:   selectedExtras,
      qty:      1,
      timestamp: Date.now()
    })
  }

  updateFAB()
  bumpFAB()

  console.clear()
  console.log('🧾 PEDIDO ACTUAL:', JSON.stringify(order, null, 2))

  closeExtras()

  // Auto-abrir el carrito solo la primera vez
  if (cartFirstOpen) {
    cartFirstOpen = false
  }
})

// Abrir al pulsar cualquier addProductButton
document.addEventListener('click', e => {
  const btn = e.target.closest('.addProductButton')
  if (!btn) return

  e.stopPropagation()

  // 🔥 guardamos qué ramen se está pidiendo
  selectedRamenID = btn.dataset.ramenId

  openExtras()
})

function extrasOpen() { return extrasSheet.classList.contains('open') }

/* ══════════════════════════════════════════
   FAB DEL CARRITO
   ══════════════════════════════════════════ */

const cartFAB    = document.getElementById('cartFAB')
const cartBadge  = document.getElementById('cartBadge')
const cartTotal  = document.getElementById('cartTotal')

/* ── Resuelve el precio de un item de order[] ── */
function calcItemPrice(item) {
  // Busca el ramen por ID — NUNCA usa precios guardados en order
  const ramen = ramenData.find(r => r.id === item.ramen_id)
  if (!ramen) return 0

  const extrasPrice = item.extras.reduce((sum, extraId) => {
    // Busca el extra en todas las categorías
    for (const cat of extrasData) {
      const found = cat.items.find(e => e.id === extraId)
      if (found) return sum + found.price
    }
    return sum
  }, 0)

  return (ramen.price + extrasPrice) * item.qty
}

/* ── Calcula el total de todo el pedido ── */
function calcOrderTotal() {
  return order.reduce((sum, item) => sum + calcItemPrice(item), 0)
}

/* ── Actualiza el FAB (badge + precio + visibilidad) ── */
function updateFAB() {
  const totalQty   = order.reduce((sum, item) => sum + item.qty, 0)
  const totalPrice = calcOrderTotal()

  cartBadge.textContent = totalQty
  //cartTotal.textContent = totalPrice.toFixed(2).replace('.', ',') + '€'

  const shouldShow = totalQty > 0
  cartFAB.classList.toggle('visible', shouldShow)
}

/* ── Bump de feedback al añadir ── */
function bumpFAB() {
  cartFAB.classList.remove('bump')
  void cartFAB.offsetWidth  // fuerza reflow para reiniciar la animación
  cartFAB.classList.add('bump')
}


/* ══════════════════════════════════════════
   HOJA DEL CARRITO
   ══════════════════════════════════════════ */

const cartSheet        = document.getElementById('cartSheet')
const cartBackdrop     = document.getElementById('cartBackdrop')
const cartItemsScroll  = document.getElementById('cartItemsScroll')
const cartFooterPrice  = document.getElementById('cartFooterPrice')
const cartClose        = document.getElementById('cartClose')
let cartFirstOpen      = true   // controla si es la primera vez que se añade

/* ── Resuelve el nombre legible de un extra desde su ID ── */
function resolveExtraName(extraId) {
  for (const cat of extrasData) {
    const found = cat.items.find(e => e.id === extraId)
    if (found) return found.name
  }
  return extraId   // fallback: devuelve el ID si no lo encuentra
}

/* ── Resuelve la imagen de un ramen desde su ID ── */
function resolveRamenImg(ramenId) {
  const ramen = ramenData.find(r => r.id === ramenId)
  return ramen ? ramen.image : ''
}

/* ── Resuelve el nombre de un ramen desde su ID ── */
function resolveRamenName(ramenId) {
  const ramen = ramenData.find(r => r.id === ramenId)
  return ramen ? ramen.name : ramenId
}

/* ── Renderiza el contenido del carrito desde order[] ── */
function renderCart() {
  cartItemsScroll.innerHTML = ''

  if (order.length === 0) {
    // Estado vacío
    cartItemsScroll.innerHTML = `
      <div id="cartEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <p>carrito vacío</p>
      </div>`

    cartFooterPrice.textContent = '0,00€'
    return
  }

  order.forEach((item, idx) => {
    const ramenName   = resolveRamenName(item.ramen_id)
    const ramenImg    = resolveRamenImg(item.ramen_id)
    const extrasLabel = item.extras.length
  ? item.extras.map(resolveExtraName).map(name => `<span>${name}</span>`).join('')
  : '<span>sin extras</span>'

    // Precio unitario (sin qty) para mostrar en la línea
    const unitPrice = calcItemPrice({ ...item, qty: 1 })
    const linePrice = calcItemPrice(item)

    const el = document.createElement('div')
    el.className = 'cartItem'
    el.dataset.orderIdx = idx

    el.innerHTML = `
      <img class="cartItemImg" src="${ramenImg}" alt="${ramenName}">
      <div class="cartItemInfo">
        <p class="cartItemName">${ramenName}</p>
        <p class="cartItemExtras">${extrasLabel}</p>
        <p class="cartItemPrice">${linePrice.toFixed(2).replace('.',',')}€</p>
      </div>
      <button class="cartItemDelete" aria-label="Eliminar ${ramenName}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>`

    // Listener del cubo de basura
    el.querySelector('.cartItemDelete').addEventListener('click', e => {
      e.stopPropagation()
      removeCartItem(el, idx)
    })

    cartItemsScroll.appendChild(el)
  })

  // Actualizar total en el footer
  cartFooterPrice.textContent = calcOrderTotal().toFixed(2).replace('.', ',') + '€'
}

/* ── Elimina un item del array y del DOM con animación ── */
function removeCartItem(el, idx) {
  // 1. Animación de salida
  el.classList.add('removing')

  // 2. Tras la animación: borrar del array y re-renderizar
  el.addEventListener('transitionend', () => {
    order.splice(idx, 1)
    renderCart()      // re-renderiza para actualizar índices
    updateFAB()       // sincroniza el badge y el precio del FAB

    // Si el carrito queda vacío: cerrar automáticamente después de un momento
    if (order.length === 0) {
      setTimeout(closeCart, 400)
      cartFirstOpen = true    // reset para que la próxima vez vuelva a auto-abrir
    }
  }, { once: true })
}


const cartSound = new Audio('./sound/cart.wav')
cartSound.volume = 0.7


/* ── Abrir / cerrar el carrito ── */
function openCart() {
  cartSound.currentTime = 0
  cartSound.play().catch(() => {})
  renderCart()
  cartSheet.classList.add('open')
}
function closeCart() {
  cartSheet.classList.remove('open')
  introFinished = false
  setTimeout(() => { introFinished = true }, 100)
}

function cartOpen() { return cartSheet.classList.contains('open') }

/* ── Listeners ── */
cartBackdrop.addEventListener('click', closeCart)
cartClose.addEventListener('click', closeCart)

document.getElementById('cartCheckout').addEventListener('click', () => {
  // Aquí conectarás con el backend
  console.log('💳 ENVIANDO PEDIDO:', JSON.stringify(order, null, 2))
  // TODO: fetch('/api/orders', { method: 'POST', body: JSON.stringify(order) })
})

// Abrir al pulsar el FAB
cartFAB.addEventListener('click', e => {
  e.stopPropagation()
  openCart()
})


</script>
